<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Meal Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F9F6F1;
  --card: #FFFFFF;
  --deep: #1C1A17;
  --muted: #8A8278;
  --border: #E8E2D9;
  --accent1: #C4724A;
  --accent2: #4A7C6B;
  --accent3: #6B5B9E;
  --accent4: #B85C6E;
  --accent5: #3A6EA5;
  --soft: #F2EDE6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--deep); padding: 1.5rem 1rem 3rem; min-height: 100vh; }
h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; text-align: center; margin-bottom: 4px; }
.subtitle { text-align: center; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; }
.tabs { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
.tab { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; padding: 7px 14px; border: 1px solid var(--border); border-radius: 30px; background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.tab.active { background: var(--deep); color: white; border-color: var(--deep); }
.panel { display: none; max-width: 620px; margin: 0 auto; }
.panel.active { display: block; }
.day-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 12px; overflow: hidden; }
.day-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; }
.day-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.day-name { font-size: 13px; font-weight: 500; min-width: 70px; }
.day-meal-preview { font-size: 12px; color: var(--muted); flex: 1; }
.day-kcal { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; white-space: nowrap; }
.chev { font-size: 11px; color: var(--muted); transition: transform 0.2s; }
.day-card.open .chev { transform: rotate(180deg); }
.day-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.day-card.open .day-body { display: block; }
.meal-name { font-family: 'Playfair Display', serif; font-size: 17px; font-style: italic; margin: 12px 0 4px; }
.meal-vibe { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
.section-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; margin-top: 12px; }
.ingr-list { list-style: none; padding: 0; }
.ingr-list li { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; padding: 5px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.ingr-list li:last-child { border-bottom: none; }
.ingr-cal { font-size: 11px; color: var(--muted); white-space: nowrap; background: var(--soft); padding: 1px 7px; border-radius: 8px; }
.method-text { font-size: 12.5px; color: var(--muted); line-height: 1.7; margin-top: 4px; }
.method-text strong { color: var(--deep); font-weight: 500; }
.batch-box { background: #EAF3DE; border-radius: 10px; padding: 8px 12px; margin-top: 10px; font-size: 12px; color: #3B6D11; line-height: 1.5; }
.tag-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--soft); color: var(--muted); }
.total-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.total-bar-outer { flex: 1; height: 3px; background: var(--border); border-radius: 2px; }
.total-bar-inner { height: 3px; border-radius: 2px; }
.total-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
.rule-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
.rule-title { font-size: 13px; font-weight: 500; color: var(--deep); margin-bottom: 5px; }
.rule-text { font-size: 12.5px; color: var(--muted); line-height: 1.6; }
.dessert-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 12px; }
.dessert-name { font-family: 'Playfair Display', serif; font-size: 18px; font-style: italic; margin-bottom: 4px; }
.dessert-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 10px; }
.dessert-toggle { font-size: 11px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--muted); cursor: pointer; font-family: 'Inter', sans-serif; }
.dessert-body { display: none; margin-top: 12px; }
.dessert-card.open .dessert-body { display: block; }
.tip-box { background: var(--soft); border-radius: 12px; padding: 12px 14px; margin-top: 10px; font-size: 12px; color: var(--muted); line-height: 1.6; }
.grocery-section { margin-bottom: 1.2rem; }
.grocery-title { font-size: 12px; font-weight: 500; color: var(--deep); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.grocery-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.grocery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.grocery-item { font-size: 12px; color: var(--muted); padding: 5px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; gap: 6px; }
.grocery-item::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.warn-box { background: #FFF8E1; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 12px; color: #7A6010; line-height: 1.6; }
.warn-box strong { color: #5A4608; font-weight: 500; }
</style>
</head>
<body>

<h1>Your weekly meal plan</h1>
<div class="subtitle">Mon–Fri dinners · repeatable · ~650 kcal · IBS/FODMAP/GF compliant</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('week')">🗓 5-day plan</button>
  <button class="tab" onclick="switchTab('rotate')">🔄 Rotation swaps</button>
  <button class="tab" onclick="switchTab('desserts')">🍰 Weekend desserts</button>
  <button class="tab" onclick="switchTab('grocery')">🛒 15-day grocery</button>
  <button class="tab" onclick="switchTab('batch')">📦 Batch cooking</button>
  <button class="tab" onclick="switchTab('weekend')">🫓 Weekend cooking</button>
</div>

<div id="panel-week" class="panel active"></div>
<div id="panel-rotate" class="panel"></div>
<div id="panel-desserts" class="panel"></div>
<div id="panel-grocery" class="panel"></div>
<div id="panel-batch" class="panel"></div>
<div id="panel-weekend" class="panel"></div>

<script>
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const map = ['week','rotate','desserts','grocery','batch','weekend'];
  document.querySelectorAll('.tab')[map.indexOf(id)].classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

  const barColor = d.total > 680 ? '#E24B4A' : '#1D9E75';
